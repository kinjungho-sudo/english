name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Create web dir (Vercel URL 방식 — 로컬 빌드 불필요)
        run: mkdir -p out && echo "<html><body>TravelSpeak</body></html>" > out/index.html

      - name: Capacitor sync
        run: npx cap sync android --inline

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TravelSpeak-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
