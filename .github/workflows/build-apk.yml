name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c87 # v4.7.1
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Capacitor copy (server.url → Vercel, web assets not bundled)
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body></body></html>' > out/index.html
          npx cap copy android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: TravelSpeak-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print APK info
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          echo "APK size: $(du -sh $APK | cut -f1)"
          echo "Build: #${{ github.run_number }} / commit: ${{ github.sha }}"
